<!DOCTYPE html>
<html lang="ru">

<meta charset="UTF-8">

<title>Биохимия — Квиз</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;background:linear-gradient(135deg,#0f172a 0%,#1e1b4b 50%,#0f172a 100%);display:flex;flex-direction:column;align-items:center;padding:16px;font-family:Georgia,serif;color:#e2e8f0}

  #prog-fill{height:100%;background:linear-gradient(90deg,#818cf8,#c084fc);border-radius:2px;transition:width .4s ease;width:0%}
  #card{width:100%;max-width:640px;background:rgba(30,27,75,.7);border:1px solid rgba(129,140,248,.2);border-radius:16px;padding:24px 20px;box-shadow:0 20px 60px rgba(0,0,0,.5)}

  #qtext{font-size:15px;line-height:1.7;color:#e2e8f0;margin-bottom:16px;white-space:pre-line;font-weight:500}
  #hint{font-size:12px;color:#94a3b8;font-style:italic;margin-bottom:10px}
  #options{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}

  .opt.selected{background:rgba(99,102,241,.25);border:1px solid #6366f1;color:#c7d2fe}
  .opt.correct{background:rgba(34,197,94,.15);border:1px solid #22c55e;color:#86efac}
  .opt.wrong{background:rgba(239,68,68,.15);border:1px solid #ef4444;color:#fca5a5}

  #actions{display:flex;justify-content:center;margin-top:8px}
  .btn{border:none;border-radius:10px;color:#fff;font-family:Georgia,serif;font-size:14px;font-weight:bold;padding:11px 32px;cursor:pointer;transition:all .2s}
  #btn-check{background:linear-gradient(135deg,#6366f1,#8b5cf6);box-shadow:0 4px 15px rgba(99,102,241,.4)}
  #btn-next{background:linear-gradient(135deg,#0ea5e9,#6366f1);box-shadow:0 4px 15px rgba(14,165,233,.4);display:none}
  #feedback{margin-top:12px;text-align:center;font-size:14px;font-weight:bold;min-height:20px}
  #correct-order{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:#86efac;display:none}
  #finish{display:none;text-align:center}
  #finish .fi{font-size:48px;margin-bottom:8px}
  #finish h1{font-size:22px;color:#c7d2fe;margin-bottom:12px}
  #big-score{font-size:42px;font-weight:bold;color:#a5b4fc}
  #big-pct{font-size:18px;color:#94a3b8;margin-bottom:16px}
  #bar-bg{height:8px;background:#334155;border-radius:4px;margin-bottom:20px;overflow:hidden}
  #bar-fill{height:100%;border-radius:4px;transition:width .6s}

  .dot{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:bold;color:#fff}
  #btn-restart{background:linear-gradient(135deg,#6366f1,#8b5cf6);box-shadow:0 4px 15px rgba(99,102,241,.4)}
</style>
</head>
<body>

<div id="topbar">
  <span id="prog-label">Вопрос 1 из 76</span>

</div>
<div id="prog-bar"><div id="prog-fill"></div></div>

<div id="card">

    <p id="hint"></p>

    <div id="options"></div>
    <div id="actions">

    </div>
    <div id="feedback"></div>
  </div>

  <div id="finish">

    <h1 id="grade-label"></h1>
    <div id="big-score"></div>
    <div id="big-pct"></div>
    <div id="bar-bg"><div id="bar-fill"></div></div>
    <div id="dot-grid"></div>
    <button class="btn" id="btn-restart" onclick="restart()">Начать заново</button>
  </div>
</div>

function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

let questions=shuffle(ALL);
let cur=0,score=0,answers=[],selected=null,orderSel=[],revealed=false;

function render(){
  const q=questions[cur];
  document.getElementById('prog-label').textContent=`Вопрос ${cur+1} из ${questions.length}`;
  document.getElementById('score-label').textContent=`✓ ${score}`;
  document.getElementById('prog-fill').style.width=`${(cur/questions.length)*100}%`;
  document.getElementById('qnum').textContent=`#${q.id} — Биохимия`;
  document.getElementById('qtext').textContent=q.q;
  document.getElementById('feedback').textContent='';
  document.getElementById('correct-order').style.display='none';
  document.getElementById('btn-check').style.display='inline-block';
  document.getElementById('btn-next').style.display='none';

  if(q.type==='order'){
    document.getElementById('hint').textContent=`Выберите ${q.correct.length} вариантов в правильном порядке (нажмите по очереди)`;
  } else {
    document.getElementById('hint').textContent='';
  }

  const opts=document.getElementById('options');
  opts.innerHTML='';
  q.opts.forEach((o,i)=>{
    const b=document.createElement('button');
    b.className='opt';
    b.innerHTML=`<span class="opt-letter">${String.fromCharCode(65+i)}</span>${o}`;
    b.onclick=()=>pick(i);
    opts.appendChild(b);
  });
}

function pick(i){
  if(revealed)return;
  const q=questions[cur];
  if(q.type==='single'){
    selected=i;
    document.querySelectorAll('.opt').forEach((b,j)=>b.className='opt'+(j===i?' selected':''));
  } else {
    const idx=orderSel.indexOf(i);
    if(idx===-1){orderSel.push(i);}
    else{orderSel.splice(idx,1);}
    updateOrderUI();
  }
}

function updateOrderUI(){
  const q=questions[cur];
  document.querySelectorAll('.opt').forEach((b,i)=>{
    const pos=orderSel.indexOf(i);
    b.className='opt'+(pos!==-1?' selected':'');
    const ltr=b.querySelector('.opt-letter');
    ltr.textContent=pos!==-1?pos+1:String.fromCharCode(65+i);
  });
}

function checkAnswer(){
  const q=questions[cur];
  revealed=true;
  let ok=false;
  if(q.type==='single'){
    if(selected===null)return;
    ok=selected===q.correct;
    document.querySelectorAll('.opt').forEach((b,i)=>{
      if(i===q.correct)b.className='opt correct';
      else if(i===selected)b.className='opt wrong';
    });
  } else {
    if(orderSel.length===0)return;
    ok=JSON.stringify(orderSel)===JSON.stringify(q.correct);
    document.querySelectorAll('.opt').forEach((b,i)=>{
      const ltr=b.querySelector('.opt-letter');
      if(q.correct.includes(i)){
        b.className='opt correct';
        ltr.textContent=q.correct.indexOf(i)+1;
      } else if(orderSel.includes(i)){
        b.className='opt wrong';
        ltr.textContent='✗';
      }
    });
    const cl=document.getElementById('correct-list');
    cl.innerHTML='';
    q.correct.forEach(idx=>{
      const li=document.createElement('li');
      li.textContent=q.opts[idx];
      li.style.marginBottom='3px';
      cl.appendChild(li);
    });
    document.getElementById('correct-order').style.display='block';
  }
  if(ok)score++;
  answers.push(ok);
  document.getElementById('feedback').textContent=ok?'✅ Правильно!':'❌ Неправильно';
  document.getElementById('feedback').style.color=ok?'#4ade80':'#f87171';
  document.getElementById('btn-check').style.display='none';
  document.getElementById('btn-next').style.display='inline-block';
  document.getElementById('btn-next').textContent=cur+1<questions.length?'Следующий →':'Результаты';
}

function nextQ(){
  cur++;
  selected=null;orderSel=[];revealed=false;
  if(cur>=questions.length){showFinish();return;}
  render();
}

function showFinish(){
  document.getElementById('quiz-view').style.display='none';
  document.getElementById('finish').style.display='block';
  document.getElementById('prog-fill').style.width='100%';
  const pct=Math.round((score/questions.length)*100);
  const grade=pct>=90?'Отлично! 🏆':pct>=70?'Хорошо! 👍':pct>=50?'Удовлетворительно 📚':'Нужно повторить 💪';
  document.getElementById('grade-label').textContent=grade;
  document.getElementById('big-score').textContent=`${score} / ${questions.length}`;
  document.getElementById('big-pct').textContent=`${pct}%`;
  const fill=document.getElementById('bar-fill');
  fill.style.width=`${pct}%`;
  fill.style.background=pct>=70?'#22c55e':pct>=50?'#f59e0b':'#ef4444';
  const grid=document.getElementById('dot-grid');
  grid.innerHTML='';
  answers.forEach((a,i)=>{
    const d=document.createElement('div');
    d.className='dot';
    d.style.background=a?'#22c55e':'#ef4444';
    d.textContent=i+1;
    grid.appendChild(d);
  });
}

function restart(){
  questions=shuffle(ALL);
  cur=0;score=0;answers=[];selected=null;orderSel=[];revealed=false;
  document.getElementById('quiz-view').style.display='block';
  document.getElementById('finish').style.display='none';
  render();
}

render();
</script>
