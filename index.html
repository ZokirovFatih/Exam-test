<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Биохимия — Тест</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
    font-family: Georgia, serif;
    color: #e2e8f0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
  }
  #topbar {
    width: 100%; max-width: 640px;
    display: flex; justify-content: space-between;
    font-size: 13px; color: #94a3b8; margin-bottom: 8px;
  }
  #score-lbl { color: #4ade80; font-weight: bold; }
  #prog-bar { width: 100%; max-width: 640px; height: 4px; background: #334155; border-radius: 2px; margin-bottom: 16px; overflow: hidden; }
  #prog-fill { height: 100%; background: linear-gradient(90deg,#818cf8,#c084fc); border-radius: 2px; transition: width .4s; }
  .card {
    width: 100%; max-width: 640px;
    background: rgba(30,27,75,.7);
    border: 1px solid rgba(129,140,248,.2);
    border-radius: 16px; padding: 24px 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,.5);
    backdrop-filter: blur(12px);
  }
  #qnum { font-size: 11px; color: #818cf8; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
  #qtext { font-size: 15px; line-height: 1.7; color: #e2e8f0; margin-bottom: 16px; white-space: pre-line; font-weight: 500; }
  #hint { font-size: 12px; color: #94a3b8; font-style: italic; margin-bottom: 10px; min-height: 18px; }
  #options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .opt {
    display: flex; align-items: flex-start; gap: 10;
    background: rgba(51,65,85,.5);
    border: 1px solid rgba(100,116,139,.3);
    border-radius: 10px; padding: 10px 14px;
    color: #cbd5e1; font-size: 13px; text-align: left;
    cursor: pointer; transition: all .15s; font-family: Georgia, serif;
    line-height: 1.5; width: 100%;
  }
  .opt:hover:not(:disabled) { background: rgba(99,102,241,.15); border-color: #6366f1; }
  .opt .ltr {
    min-width: 22px; height: 22px;
    background: rgba(99,102,241,.3); border-radius: 6px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: bold; flex-shrink: 0; color: #a5b4fc;
  }
  .opt.selected { background: rgba(99,102,241,.25); border-color: #6366f1; color: #c7d2fe; }
  .opt.correct  { background: rgba(34,197,94,.15);  border-color: #22c55e; color: #86efac; }
  .opt.wrong    { background: rgba(239,68,68,.15);  border-color: #ef4444; color: #fca5a5; }
  #actions { display: flex; justify-content: center; margin-top: 8px; }
  .btn {
    border: none; border-radius: 10px; color: #fff;
    font-family: Georgia, serif; font-size: 14px; font-weight: bold;
    padding: 11px 32px; cursor: pointer; transition: all .2s;
  }
  #btn-check { background: linear-gradient(135deg,#6366f1,#8b5cf6); box-shadow: 0 4px 15px rgba(99,102,241,.4); }
  #btn-next  { background: linear-gradient(135deg,#0ea5e9,#6366f1); box-shadow: 0 4px 15px rgba(14,165,233,.4); display:none; }
  #feedback { margin-top: 12px; text-align: center; font-size: 14px; font-weight: bold; min-height: 22px; }
  #correct-order { display:none; background: rgba(34,197,94,.08); border:1px solid rgba(34,197,94,.2); border-radius:8px; padding:10px 14px; margin-bottom:12px; font-size:13px; color:#86efac; }
  #correct-order ol { margin: 6px 0 0 0; padding-left: 20px; }
  #correct-order li { margin-bottom: 3px; }

  /* Finish */
  #finish { display:none; text-align:center; }
  #finish .icon { font-size: 48px; margin-bottom: 8px; }
  #finish h1 { font-size: 22px; color: #c7d2fe; margin-bottom: 12px; }
  #big-score { font-size: 42px; font-weight: bold; color: #a5b4fc; }
  #big-pct { font-size: 18px; color: #94a3b8; margin-bottom: 16px; }
  #res-bar { height: 8px; background: #334155; border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
  #res-fill { height: 100%; border-radius: 4px; transition: width .6s; }
  #ans-grid { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 20px; }
  .dot { width: 28px; height: 28px; border-radius: 6px; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:bold; color:#fff; }
  #btn-restart { background: linear-gradient(135deg,#6366f1,#8b5cf6); }
</style>
</head>
<body>

<div id="topbar">
  <span id="prog-lbl">Вопрос 1 из 76</span>
  <span id="score-lbl">✓ 0</span>
</div>
<div id="prog-bar"><div id="prog-fill" style="width:0%"></div></div>

<div class="card" id="quiz-card">
  <div id="qnum"></div>
  <p id="qtext"></p>
  <div id="hint"></div>
  <div id="correct-order"><strong>Правильный порядок:</strong><ol id="co-list"></ol></div>
  <div id="options"></div>
  <div id="actions">
    <button class="btn" id="btn-check" onclick="checkAnswer()">Проверить</button>
    <button class="btn" id="btn-next"  onclick="nextQuestion()">Следующий →</button>
  </div>
  <div id="feedback"></div>
</div>

<div class="card" id="finish" style="display:none">
  <div class="icon">🧬</div>
  <h1 id="grade"></h1>
  <div id="big-score"></div>
  <div id="big-pct"></div>
  <div id="res-bar"><div id="res-fill"></div></div>
  <div id="ans-grid"></div>
  <div style="display:flex;justify-content:center">
    <button class="btn" id="btn-restart" onclick="restart()">Начать заново</button>
  </div>
</div>

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

let shuffled=shuffle(questions), current=0, selected=null, orderSelected=[], revealed=false, score=0, answers=[];

function render(){
  const q=shuffled[current];
  document.getElementById('prog-lbl').textContent=`Вопрос ${current+1} из ${shuffled.length}`;
  document.getElementById('score-lbl').textContent=`✓ ${score}`;
  document.getElementById('prog-fill').style.width=`${(current/shuffled.length)*100}%`;
  document.getElementById('qnum').textContent=`#${q.id} — Биохимия`;
  document.getElementById('qtext').textContent=q.question;
  document.getElementById('hint').textContent=q.type==='order'&&!revealed?`Выберите ${q.correct.length} вариантов в правильном порядке`:'';
  document.getElementById('correct-order').style.display='none';
  document.getElementById('feedback').textContent='';
  document.getElementById('btn-check').style.display='inline-block';
  document.getElementById('btn-next').style.display='none';

  const opts=document.getElementById('options');
  opts.innerHTML='';
  q.options.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='opt';
    const pos=orderSelected.indexOf(i);
    let ltr=q.type==='single'?String.fromCharCode(65+i):(pos!==-1?pos+1:String.fromCharCode(65+i));
    btn.innerHTML=`<span class="ltr">${ltr}</span>${opt}`;
    if(q.type==='single'){btn.onclick=()=>selectSingle(i);}
    else{btn.onclick=()=>selectOrder(i);}
    if(q.type==='single'&&selected===i) btn.classList.add('selected');
    if(q.type==='order'&&pos!==-1) btn.classList.add('selected');
    opts.appendChild(btn);
  });
}

function selectSingle(i){if(revealed)return;selected=i;render();}
function selectOrder(i){
  if(revealed)return;
  const pos=orderSelected.indexOf(i);
  if(pos!==-1)orderSelected.splice(pos,1);
  else orderSelected.push(i);
  render();
}

function checkAnswer(){
  const q=shuffled[current];
  let correct=false;
  if(q.type==='single'){if(selected===null)return;correct=selected===q.correct;}
  else{if(orderSelected.length===0)return;correct=JSON.stringify(orderSelected)===JSON.stringify(q.correct);}
  revealed=true;
  if(correct)score++;
  answers.push(correct);
  applyReveal();
}

function applyReveal(){
  const q=shuffled[current];
  const btns=document.getElementById('options').querySelectorAll('.opt');
  btns.forEach((btn,i)=>{
    btn.classList.remove('selected');
    if(q.type==='single'){
      if(i===q.correct)btn.classList.add('correct');
      else if(i===selected&&i!==q.correct)btn.classList.add('wrong');
    } else {
      if(q.correct.includes(i)){
        btn.classList.add('correct');
        btn.querySelector('.ltr').textContent=q.correct.indexOf(i)+1;
      } else if(orderSelected.includes(i)){
        btn.classList.add('wrong');
        btn.querySelector('.ltr').textContent='✗';
      }
    }
  });
  const isCorrect=q.type==='single'?selected===q.correct:JSON.stringify(orderSelected)===JSON.stringify(q.correct);
  const fb=document.getElementById('feedback');
  fb.textContent=isCorrect?'✅ Правильно!':'❌ Неправильно';
  fb.style.color=isCorrect?'#4ade80':'#f87171';

  if(q.type==='order'){
    const co=document.getElementById('correct-order');
    co.style.display='block';
    const ol=document.getElementById('co-list');
    ol.innerHTML='';
    q.correct.forEach(idx=>{const li=document.createElement('li');li.textContent=q.options[idx];ol.appendChild(li);});
  }
  document.getElementById('hint').textContent='';
  document.getElementById('btn-check').style.display='none';
  document.getElementById('btn-next').style.display='inline-block';
  document.getElementById('btn-next').textContent=current+1<shuffled.length?'Следующий →':'Результаты';
}

function nextQuestion(){
  if(current+1>=shuffled.length){showFinish();return;}
  current++;selected=null;orderSelected=[];revealed=false;
  render();
}

function showFinish(){
  document.getElementById('quiz-card').style.display='none';
  document.getElementById('topbar').style.display='none';
  document.getElementById('prog-bar').style.display='none';
  const fin=document.getElementById('finish');
  fin.style.display='block';
  const pct=Math.round(score/shuffled.length*100);
  const grade=pct>=90?'Отлично! 🏆':pct>=70?'Хорошо! 👍':pct>=50?'Удовлетворительно 📚':'Нужно повторить 💪';
  document.getElementById('grade').textContent=grade;
  document.getElementById('big-score').textContent=`${score} / ${shuffled.length}`;
  document.getElementById('big-pct').textContent=`${pct}%`;
  const fill=document.getElementById('res-fill');
  fill.style.width=`${pct}%`;
  fill.style.background=pct>=70?'#22c55e':pct>=50?'#f59e0b':'#ef4444';
  const grid=document.getElementById('ans-grid');
  grid.innerHTML='';
  answers.forEach((a,i)=>{
    const d=document.createElement('div');
    d.className='dot';d.style.background=a?'#22c55e':'#ef4444';d.textContent=i+1;
    grid.appendChild(d);
  });
}

function restart(){
  shuffled=shuffle(questions);current=0;selected=null;orderSelected=[];revealed=false;score=0;answers=[];
  document.getElementById('quiz-card').style.display='block';
  document.getElementById('topbar').style.display='flex';
  document.getElementById('prog-bar').style.display='block';
  document.getElementById('finish').style.display='none';
  render();
}

render();
</script>
